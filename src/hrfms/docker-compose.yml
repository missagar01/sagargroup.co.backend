version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: hr-fms-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - hr-fms-network
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  redis_data:

networks:
  hr-fms-network:
    driver: bridge
