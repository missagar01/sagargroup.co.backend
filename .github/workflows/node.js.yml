name: Deploy to EC2 (PM2 - Fast)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: deploy-o2d-lead-batch
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20

    steps:
      # 1️⃣ Fast checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2️⃣ Fixed app directory
      - name: Set APP_DIR
        run: |
          echo "APP_DIR=/home/ubuntu/actions-runner/_work/O2D-BatchCode-Lead-backend-aws/O2D-BatchCode-Lead-backend-aws" >> $GITHUB_ENV

      # 3️⃣ Ensure .env exists (safe)
      - name: Ensure .env exists
        run: |
          if [ ! -f "$APP_DIR/.env" ]; then
            cp /home/ubuntu/secrets/o2d-backend/.env "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
          fi

      # 4️⃣ Setup Node.js + npm cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      # 5️⃣ Install dependencies (FAST)
      - name: Install dependencies
        run: |
          cd "$APP_DIR"
          npm ci --prefer-offline --no-audit --no-fund

      # 6️⃣ PM2 Zero-downtime reload
      - name: PM2 Reload
        run: |
          cd "$APP_DIR"

          if pm2 describe o2d-lead-batch >/dev/null 2>&1; then
            pm2 reload o2d-lead-batch --update-env
          else
            pm2 start src/o2d/index.js \
              --name o2d-lead-batch \
              --cwd "$APP_DIR"
          fi

          pm2 save

      # 7️⃣ Lightweight health check
      - name: Health check
        run: |
          pm2 list | grep o2d-lead-batch
