name: Deploy to EC2 (PM2)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: deploy-o2d-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 45

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2️⃣ Set FIXED app directory
      - name: Set APP_DIR
        run: |
          APP_DIR="/home/ubuntu/actions-runner/_work/O2D-BatchCode-Lead-backend-aws/O2D-BatchCode-Lead-backend-aws"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          echo "✅ APP_DIR set to $APP_DIR"

      # 3️⃣ Ensure .env exists (never overwrite)
      - name: Ensure .env exists safely
        run: |
          if [ ! -f "$APP_DIR/.env" ]; then
            echo "⚠️ .env not found"

            if [ ! -f "/home/ubuntu/secrets/o2d-backend/.env" ]; then
              echo "❌ Source .env missing"
              exit 1
            fi

            cp /home/ubuntu/secrets/o2d-backend/.env "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
            echo "✅ .env copied"
          else
            echo "✅ .env already exists — untouched"
          fi

      # 4️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 5️⃣ Install dependencies
      - name: Install dependencies
        run: |
          cd "$APP_DIR"
          npm ci --no-audit --no-fund

      # 6️⃣ Start / Restart PM2 (CORRECT APP)
      - name: Start / Restart PM2 (o2d-backend)
        run: |
          cd "$APP_DIR"

          pm2 delete o2d-lead-batch || true   # cleanup old wrong app
          pm2 delete o2d-backend || true

          PORT=3004 pm2 start server.js \
            --name o2d-backend \
            --update-env

          pm2 save
          echo "✅ PM2 o2d-backend deployed"

      # 7️⃣ Health check
           # 7️⃣ Health check (FAST & SAFE)
      - name: Health check (wait for port)
        run: |
          echo "⏳ Waiting for port 3004 (max 30s)..."

          for i in {1..15}; do
            if ss -lnt | grep -q ":3004"; then
              echo "✅ Port 3004 is listening"
              break
            fi
            sleep 2
          done

          # Final verification (1 time only)
          curl -f http://127.0.0.1:3004/health || exit 1
          curl -f -k https://o2d.sagartmt.com/api/health || echo "⚠️ Public health check skipped/failed (DNS propagation/SSL issue?)"


          echo "🎉 Health check passed"
